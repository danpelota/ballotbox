
services:
  airflow:
    build: ./orchestrator
    ports:
      - "8080:8080"
    volumes:
      # Hotload DAGs and dbt directories for live development
      - ./orchestrator/dags:/opt/airflow/dags
      - ./dbt-ballotbox:/opt/dbt-ballotbox
      - ./data:/opt/data
    environment:
      # Enable auto-refresh of DAGs in development
      - AIRFLOW__WEBSERVER__RELOAD_ON_PLUGIN_CHANGE=True

  reports:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./dbt-ballotbox/reports/build:/usr/share/nginx/html:ro
